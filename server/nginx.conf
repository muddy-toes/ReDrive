# /etc/nginx/sites-available/redrive
# Symlink: ln -s /etc/nginx/sites-available/redrive /etc/nginx/sites-enabled/redrive

server {
    listen 80;
    server_name redrive.estimstation.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name redrive.estimstation.com;

    # --- Certbot managed certificates ---
    ssl_certificate     /etc/letsencrypt/live/redrive.estimstation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/redrive.estimstation.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Proxy all traffic to the aiohttp server ---
    location / {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;

        # WebSocket upgrade (needed for /room/{code}/rider)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WS connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
