<!DOCTYPE html>
<html lang="en">
<head>
<script>
const ROOM_CODE = "{{ room_code | default('', true) }}";
const API_PREFIX = "{{ api_prefix }}";
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ReDrive &middot; Rider</title>
<link rel="stylesheet" href="/public/css/touch.css">
</head>
<body>

<div id="header">
  <div id="conn"><div id="cdot"></div><span id="ctxt">Connecting&#8230;</span></div>
  <input id="rider-name-input" placeholder="Your name" maxlength="30">
  <button id="stop-btn" onclick="doStop()">&#9632; STOP</button>
  <button id="settings-btn" onclick="toggleSettings()" style="background:none;border:none;color:var(--fg2);font-size:18px;cursor:pointer;padding:4px 8px" title="Settings">&#9881;</button>
</div>

<div id="driven-by">Driven by <strong id="driven-by-name"></strong></div>
<div id="driver-status" style="text-align:center;font-size:12px;color:var(--fg2);padding:2px 0">
  <span id="restim-status" style="font-size:11px;margin-left:12px">ReStim: disabled</span>
</div>

<div id="settings-panel" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin:8px 12px">
  <div style="font-size:12px;color:var(--fg2);margin-bottom:8px;font-weight:bold">ReStim Connection</div>

  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <label for="restim-toggle" style="font-size:11px;color:var(--fg2)">Enabled</label>
    <input type="checkbox" id="restim-toggle" onchange="onRestimToggle(this.checked)" />
  </div>

  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <label for="restim-url-input" style="font-size:11px;color:var(--fg2);white-space:nowrap">URL</label>
    <input type="text" id="restim-url-input" value=""
           style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;font-family:monospace"
           placeholder="ws://localhost:12346/tcode" />
    <button onclick="saveRestimUrl()" style="font-size:10px;padding:2px 8px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer">Save</button>
  </div>
</div>

<div id="riders-panel"></div>

<div id="power-section">
  <div id="power-label">POWER</div>
  <div id="power-bar-wrap">
    <div id="power-bar"></div>
    <div id="power-pct">&#8212;</div>
  </div>
</div>

<div id="emote-grid">
  <button class="emote-btn" onclick="sendLike('😍')">😍</button>
  <button class="emote-btn" onclick="sendLike('⚡')">⚡</button>
  <button class="emote-btn" onclick="sendLike('💦')">💦</button>
  <button class="emote-btn" onclick="sendLike('🔥')">🔥</button>
  <button class="emote-btn" onclick="sendLike('👋')">👋</button>
  <button class="emote-btn" onclick="sendLike('😈')">😈</button>
</div>

<div id="footer">
  <button id="room-code-btn" onclick="copyRoomCode(this)"></button>
  <label id="upload-avatar-btn" title="Upload your anatomy image (sets your avatar)"
    style="padding:4px 10px;background:none;border:1px solid var(--border);border-radius:4px;
           color:var(--fg2);font-size:11px;cursor:pointer">
    &#128247; My Pic
    <input type="file" id="anat-file-input" accept="image/png,image/jpeg,image/webp"
           style="display:none" onchange="onAnatFileSelected(this)">
  </label>
</div>

<div id="bottle-overlay">
  <img src="/bottle.png" style="max-width:55vmin;max-height:40vmin;object-fit:contain;border-radius:8px">
  <div id="bottle-overlay-heading" style="color:#fff;font-size:1.7rem;font-weight:bold;text-align:center"></div>
  <div id="bottle-overlay-sub"     style="color:#ffcc14;font-size:1.1rem;text-align:center"></div>
  <div id="bottle-overlay-dots"    style="display:flex;justify-content:center;flex-wrap:wrap;gap:4px"></div>
  <div id="bottle-overlay-cd"      style="color:#fff;font-size:1.2rem;font-family:monospace;opacity:0.7"></div>
</div>

<script src="/public/js/touch.js"></script>
{% if room_code %}
<script>
(function(){
  var btn = document.getElementById("room-code-btn");
  if(btn){ btn.style.display="inline-block"; btn.textContent="Room: {{ room_code }}"; }
})();
</script>
{% endif %}
</body>
</html>
